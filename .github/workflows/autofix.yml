name: GPTCode AutoFix
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Failed workflow run ID'
        required: true
      branch:
        description: 'Branch where CI failed'
        required: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Install gptcode CLI
        run: |
          curl -sL https://gptcode.live/install.sh | bash
          echo "$HOME/.gptcode/bin" >> $GITHUB_PATH

      - name: Fetch failed CI logs
        run: |
          gh run view ${{ inputs.run_id }} --log-failed 2>/dev/null | tail -200 > /tmp/ci-errors.log || true
          if [ ! -s /tmp/ci-errors.log ]; then
            echo "Could not fetch logs for run ${{ inputs.run_id }}" > /tmp/ci-errors.log
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run AutoFix agent
        run: |
          CI_ERRORS=$(cat /tmp/ci-errors.log | tail -100)
          gptcode do "Fix the CI failure from workflow run ${{ inputs.run_id }}. Here are the error logs:\n\n${CI_ERRORS}\n\nAnalyze the errors, identify the root cause, and apply the fix. Run the project's test suite to verify."
        env:
          GPTCODE_LIVE_URL: https://gptcode.live
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create branch and PR
        if: steps.check.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="autofix/run-${{ inputs.run_id }}"
          git config user.name "GPTCode Agent"
          git config user.email "agent@gptcode.live"
          git checkout -b "$BRANCH_NAME"
          git add -A
          git commit -m "fix(ci): automated fix for run #${{ inputs.run_id }}

          🤖 This fix was automatically generated by GPTCode Agent.
          
          Failed run: https://github.com/${{ github.repository }}/actions/runs/${{ inputs.run_id }}
          Track agent: https://gptcode.live/dashboard"
          git push origin "$BRANCH_NAME"
          
          PR_URL=$(gh pr create \
            --title "fix(ci): automated fix for run #${{ inputs.run_id }}" \
            --body "## 🤖 Automated Fix by GPTCode Agent

          This PR was automatically generated to fix CI failures.

          **Failed run:** [${{ inputs.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ inputs.run_id }})
          **Agent dashboard:** [gptcode.live/dashboard](https://gptcode.live/dashboard)

          ### Error Summary
          \`\`\`
          $(head -30 /tmp/ci-errors.log)
          \`\`\`

          ---
          > Please review the changes carefully before merging." \
            --label "autofix,bot" \
            --base "${{ inputs.branch }}")
          
          echo "PR created: $PR_URL"
          
          # Report PR URL to Live Dashboard
          curl -s -X POST https://gptcode.live/api/report/step \
            -H "Content-Type: application/json" \
            -d "{\"agent_id\": \"autofix-${{ inputs.run_id }}\", \"description\": \"PR created: $PR_URL\", \"type\": \"complete\", \"pr_url\": \"$PR_URL\"}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report no changes
        if: steps.check.outputs.has_changes == 'false'
        run: |
          echo "⚠️ AutoFix did not produce any code changes"
          curl -s -X POST https://gptcode.live/api/report/step \
            -H "Content-Type: application/json" \
            -d "{\"agent_id\": \"autofix-${{ inputs.run_id }}\", \"description\": \"No changes produced — manual intervention needed\", \"type\": \"error\"}"
